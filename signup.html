<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="signup.css">
</head>
<body style="align-items: center;">
   <div class="container text-center">
  <div class="row align-items-center">
    <div class="col">
     <img src="signup.jpg" class="img-fluid sign-up-image" alt="signUp">
    </div>
    <div class="col">
      <div>
        <h3>Create an account</h3>
        <p>Already have an account?<a href="Log_in.html">Log in</a></p>
      </div>
      <div class="row align-items-center">
        <div class="col">
     <div class="input-group mb-3">
  <input type="text" class="form-control" placeholder="First Name" aria-label="FirstName" aria-describedby="basic-addon1">
</div>
    </div>
    <div class="col">
     <div class="input-group mb-3">
  <input type="text" class="form-control" placeholder="Last Name" aria-label="LastName" aria-describedby="basic-addon1">
</div>
    </div>
      <div class="input-group mb-3">
  <input type="text" class="form-control" placeholder="Enter email" aria-label="email" aria-describedby="basic-addon2">
  <span class="input-group-text" id="basic-addon2">@gmail.com</span>
</div>
    </div>

    <div class="input-group mb-3">
  <input type="password" class="form-control" placeholder="Enter your password" aria-label="password" aria-describedby="basic-addon1">
</div>

<div class="input-group mb-3">
  <div class="input-group-text">
    <input class="form-check-input mt-0" type="checkbox" value="" aria-label="terms">
  </div>
  <input type="text" class="form-control" aria-label="Text input with checkbox"  placeholder="I agree to the terms and conditions">
</div>

  <button type="button" class="btn btn-primary">Create Account</button>


      <div class="divider">Or register with</div>


<div class="d-grid gap-2 d-md-block">
  <button class="btn btn-outline-secondary btn-sm" type="button">Google</button>
  <button class="btn btn-outline-secondary btn-sm" type="button">Apple</button>
</div>



  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
